name: marketplace-hello-world

on:
  push:
  workflow_dispatch:

jobs:
  hello-world:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Run Hello World JS Action
        uses: actions/hello-world-javascript-action@main
        with:
          who-to-greet: "GitHub Actions Student"
          
      - name: Print Production Environment Variable
        run: echo "The current environment is:${{ vars.MY_ENVIRONMENT }}"

  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy CLI
        uses: ankurk91/install-trivy-cli-action@v2
        with:
          version: latest
          cache: true

      - name: Run Trivy version
        run: trivy --version

      - name: Run Trivy scan
        run: trivy fs . --exit-code 1 --severity HIGH,CRITICAL
